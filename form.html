<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Form & Nav</title>
    <style>
        h1 {
            text-align: center;
        }

        nav {
            display: flex;
            justify-content: space-between;
        }

        nav a {
            text-decoration: none;
            color: black;
            padding: 5px;
            font-size: large;
        }

        .form_part {
            display: flex;
            flex-direction: column;
            /* justify-content: center; */
            gap: 10px;
            width: 40%;
            border: 1px solid red;
            margin-top: 20px;

        }

        .form_part input {
            width: 100%;
            padding: 5px;
            font-size: 15px;
            box-sizing: border-box;
        }

        .form_part button {
            width: 100%;
            height: 35px;
            font-size: 15px;
            cursor: pointer;
        }

        .form-section {
            border: 1px solid blue;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 90vh;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <span>
                <a href="">Home</a>
                <a href="">About</a>
                <a href="">Blogs</a>
                <a href="">News</a>
            </span>
            <a href="">Career</a>
        </nav>
    </header>
    <main>
        <h1>Please Fill up the Form</h1>
        <section class="form-section">
            <form class="form_part">
                <input type="text" name="" id="" placeholder="Enter Name" required>
                <input type="email" name="" id="" placeholder="Enter Mail" required>
                <input type="password" name="" id="" required>
                <button>Login</button>
            </form>
        </section>

    </main>


</body>

</html>
