<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        .container{
            border: 1px dotted blue;
            height: 400px;
            display: flex;
            justify-content:center;
            align-items: center;
            flex-wrap: wrap;
            /* flex-direction: column; */
        }
        .box{
            width: 50px;
            height: 50px;
            border: 2px solid orange;
            
        }
    </style>
</head>
<body>
    <h1>Flexbox Layout</h1>
    <section class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
    </section>
    
</body>
</html>
